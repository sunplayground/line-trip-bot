name = "line-trip-bot"
main = "src/index.js"
compatibility_date = "2025-01-01"
workers_dev = true

[vars]
MODEL = "google/gemini-3.1-pro-preview"
ALLOWED_GROUP_IDS = ""

[[queues.producers]]
queue = "line-trip-events"
binding = "EVENT_QUEUE"

[[queues.consumers]]
queue = "line-trip-events"
max_batch_size = 1
max_concurrency = 5